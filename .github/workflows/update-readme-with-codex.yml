name: Update README with Codex

on:
  workflow_dispatch:
  schedule:
    # GitHub cron uses UTC; this is Tuesday 4:00 PM for UTC-7.
    - cron: "0 23 * * 2"

permissions:
  contents: write
  pull-requests: write

jobs:
  update-readme:
    name: Update README
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CODEX_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Validate Codex API key
        run: |
          if [ -z "$CODEX_API_KEY" ]; then
            echo "Missing OPENAI_API_KEY repository secret required by the Codex CLI."
            exit 1
          fi

      - name: Update README with Codex
        run: |
          codex exec --sandbox workspace-write --ephemeral --ignore-user-config --ignore-rules \
            "Review this repository and understand how it works. Create a clear, accurate root README.md if one does not exist. If README.md already exists, update only the parts that are inaccurate, incomplete, or stale. Do not change any files except README.md. Keep the README concise and useful for developers: describe the app, tech stack, local setup, available scripts, and testing. Do not invent features or setup steps that are not supported by the repository."

      - name: Ensure only README changed
        run: |
          changed_files="$(git status --porcelain | awk '{print $2}')"

          if [ -z "$changed_files" ]; then
            echo "No README updates needed."
            exit 0
          fi

          unexpected_files="$(printf '%s\n' "$changed_files" | grep -v '^README.md$' || true)"

          if [ -n "$unexpected_files" ]; then
            echo "Codex changed files outside README.md:"
            printf '%s\n' "$unexpected_files"
            exit 1
          fi

      - name: Open README update PR
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: README.md
          branch: codex/update-readme
          commit-message: Update README with Codex
          title: Update README with Codex
          body: |
            Codex reviewed the repository and updated `README.md`.

            This PR is generated by the scheduled README maintenance workflow.
          labels: documentation
